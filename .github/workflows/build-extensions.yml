name: Build Extensions

on:
  push:
    branches:
      - main
    paths:
      - 'extensions/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup system zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Build and Package Extensions
        run: node .github/scripts/build-extensions.js

      - name: Deploy dist to dist branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          MAIN_SHA=$(git rev-parse --short HEAD)

          # Save built dist then clean working tree for branch switch
          cp -r dist /tmp/dist-output
          rm -rf dist

          # Checkout existing dist branch or create it
          if git ls-remote --exit-code origin dist >/dev/null 2>&1; then
            git fetch origin dist
            git checkout dist
          else
            git checkout --orphan dist
            git rm -rf .
          fi

          # Replace all artifacts with fresh build
          git rm -rf . 2>/dev/null || true
          cp /tmp/dist-output/*.zip /tmp/dist-output/index.json .

          # Stage and commit
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(dist): auto-build from main@${MAIN_SHA}"
            git push origin dist

            # Tag this build with the source commit hash
            git tag "dist-${MAIN_SHA}"
            git push origin "dist-${MAIN_SHA}"

            # Move dist-latest tag to this commit
            git tag -f dist-latest
            git push origin dist-latest --force
          fi
